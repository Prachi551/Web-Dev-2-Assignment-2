<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Async Weather Tracker</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #e6e4e5, #db6ea8);
            padding: 20px;
        }

        .container {
            max-width: 1300px;
            margin: auto;
        }

        .parent-card {
            display: flex;
            gap: 20px;
        }

        h1 {
            text-align: center;
            color: #00090c;
            margin-bottom: 20px;
        }

        .card {
            background: #fff;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            width: 100%;
        }

        .input-group {
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            padding: 10px;
            border-radius: 6px;
            border: 2px solid #cf84b1;
        }

        button {
            padding: 10px 20px;
            background: #8a2766;
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        .weather-item {
            display: flex;
            justify-content: space-between;
            padding: 8px;
            border-left: 4px solid #F16D34;
            margin-bottom: 6px;
            background: #f9f9f9;
        }

        .console {
            background: #161E54;
            color: #BBE0EF;
            padding: 15px;
            border-radius: 8px;
            font-family: monospace;
            max-height: 250px;
            overflow-y: auto;
        }

        .log.async {
            border-left: 3px solid #F16D34;
            padding-left: 6px;
        }

        .log.promise {
            border-left: 3px solid #FF986A;
            padding-left: 6px;
        }

        .log.callback {
            border-left: 3px solid #BBE0EF;
            padding-left: 6px;
        }

        .history button {
            margin: 5px;
            padding: 6px 14px;
            border-radius: 20px;
        }

        @media (max-width:700px) {
            .parent-card {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>
 
    <div class="container">

        <h1>🌤 Async Weather Tracker</h1>

        <div class="parent-card">
            <div class="card">
                <h3>Search City</h3>
                <div class="input-group">
                    <input id="cityInput" placeholder="Delhi, London">
                    <button id="searchBtn">Search</button>
                </div>
                <br>
                <br>
                <h3>Search History</h3>
                <div class="history" id="history"></div>
            </div>

            <div class="card">
                <h3>Weather Info</h3>
                <div id="weather"></div>
            </div>
        </div>

        <!-- <div class="card">
            <h3>Console – Event Loop</h3>
            <div class="console" id="console"></div>
        </div> -->

    </div>

<script src="script.js"></script>
</body>

</html>
